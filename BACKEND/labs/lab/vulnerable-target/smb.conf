[global]
   workgroup = WORKGROUP
   server string = Vulnerable Lab SMB
   server role = standalone server
   security = user
   map to guest = Bad User
   smb ports = 445
   server min protocol = NT1
   client min protocol = NT1
   ntlm auth = yes
   lanman auth = yes
   log file = /var/log/samba/log.%m
   max log size = 50

[public]
   path = /srv/labdata
   browseable = yes
   read only = no
   guest ok = yes
   writable = yes
   create mask = 0777
   directory mask = 0777
